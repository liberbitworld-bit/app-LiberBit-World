name: Treasury Sync

# Sincroniza balance + movimientos de la wallet Liberbitworld@coinos.io
# a la tabla Supabase treasury_snapshots. Cada 15 min + manual.
#
# Secrets requeridos (Settings → Secrets and variables → Actions):
#   COINOS_SK            — nsec hex 64 chars de la wallet de tesorería
#   SUPABASE_URL         — https://<project>.supabase.co (sin barra final)
#   SUPABASE_SERVICE_KEY — service_role key de Supabase

on:
  schedule:
    # GitHub Actions cron tiene un mínimo efectivo de 5 min y suele
    # ir con retraso de 5-10 min. */15 nos da ~4 actualizaciones por
    # hora sin pasarnos.
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/treasury-sync/package.json

      - name: Install
        working-directory: scripts/treasury-sync
        run: npm install --no-audit --no-fund

      - name: Sync
        working-directory: scripts/treasury-sync
        run: node sync.mjs
        env:
          COINOS_SK: ${{ secrets.COINOS_SK }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
